name: StudyBreak
options:
  bundleIdPrefix: com.shimondeitel.studybreak
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  StudyBreak:
    type: application
    platform: iOS
    sources:
      - path: StudyBreak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.studybreak
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: StudyBreak/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StudyBreakTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StudyBreakTests
      - path: StudyBreak.storekit
    dependencies:
      - target: StudyBreak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.studybreak.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  StudyBreakUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StudyBreakUITests
    dependencies:
      - target: StudyBreak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.studybreak.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  StudyBreak:
    build:
      targets:
        StudyBreak: all
        StudyBreakTests: [test]
        StudyBreakUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: StudyBreak.storekit
    test:
      config: Debug
      storeKitConfiguration: StudyBreak.storekit
      targets:
        - StudyBreakTests
        - StudyBreakUITests
    archive:
      config: Release
